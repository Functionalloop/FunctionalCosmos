services:
  # ---------------------------------------------------------
  # FRONTEND: Next.js Web App
  # ---------------------------------------------------------
  - type: web
    name: functional-cosmos-web
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: 20.x
